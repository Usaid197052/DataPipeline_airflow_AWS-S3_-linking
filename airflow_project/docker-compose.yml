version: '3.8'

services:
  airflow:
    image: apache/airflow:2.9.3
    container_name: airflow
    ports:
      - "8080:8080"

    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor

    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ../docker_implementation/data:/opt/airflow/data 

    command: >
      bash -c "
      pip install pandas requests pymysql boto3 &&
      airflow db migrate &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname Usaid \
        --lastname Ahmed \
        --role Admin \
        --email admin@example.com || true &&
      airflow scheduler & 
      sleep 5 &&
      airflow webserver
      "